  />
  <path
    d="M512 120C341.34 120 200 261.34 200 432
       C200 519.6 236.8 598.8 295.2 655.6
       C328 686.8 352 726.8 352 770V844
       C352 860.6 365.4 874 382 874H446
       C462.6 874 476 860.6 476 844V772
       C476 744.4 494.6 722 520 715.4
       C626.8 686.6 720 592.6 720 432
       C720 261.34 682.66 120 512 120Z"
    stroke="#E8720A"
    stroke-width="28"
    stroke-linejoin="round"
    fill="none"
  />

