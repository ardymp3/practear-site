  <!-- Eardrum center dot -->
  <circle cx="484" cy="444" r="42" fill="#E8720A"/>
  <circle cx="484" cy="444" r="28" fill="#F59E0B"/>

  <defs>
    <linearGradient id="earFill" x1="200" y1="120" x2="720" y2="874" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8720A"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0.2"/>
