      <div class="policy-card feedback-card">
        <p class="eyebrow">Feedback</p>
        <h1>Tell us what PractEar should improve next.</h1>
        <p>Pick a topic, write your note, and your email app will open with the message prepared for support.</p>

        <form class="feedback-form" id="feedback-form">
          <label for="topic">Select a topic</label>
          <select id="topic" name="topic" required>
            <option value="">Select a topic</option>
            <option value="Feature request">Feature request</option>
            <option value="Bug report">Bug report</option>
            <option value="Practice content">Practice content</option>
            <option value="App store question">App store question</option>
            <option value="Other">Other</option>
          </select>

          <label for="message">Your feedback</label>
          <textarea
            id="message"
            name="message"
            rows="7"
            placeholder="Write your feedback here..."
            required
          ></textarea>

          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
          <button class="primary-button" type="submit">Submit Feedback</button>
        </form>
