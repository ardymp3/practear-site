<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#090d19">
    <title>PractEar | Coming Soon</title>
    <style>
      :root {
        --bg: #090d19;
        --surface: rgba(18, 24, 39, 0.82);
        --line: rgba(132, 154, 214, 0.18);
        --text: #f8f4ef;
        --text-soft: rgba(248, 244, 239, 0.72);
        --accent: #ffb000;
        --accent-2: #ff756b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 176, 0, 0.16), transparent 34%),
          radial-gradient(circle at 82% 72%, rgba(255, 117, 107, 0.12), transparent 30%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        padding: 24px;
      }

      main {
        width: min(100%, 680px);
        padding: clamp(32px, 6vw, 58px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.34);
        text-align: center;
      }

      .brand {
        margin: 0 0 20px;
        color: #fff;
        font-size: clamp(2.25rem, 7vw, 4.4rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.95;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.8rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 18px auto 0;
        max-width: 520px;
        color: var(--text-soft);
        font-size: clamp(1rem, 2.4vw, 1.16rem);
      }

      .accent {
        color: var(--accent-2);
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="coming-soon-title">
      <p class="brand">PractEar</p>
      <p class="eyebrow">Ear Training App</p>
      <h1 id="coming-soon-title">Coming <span class="accent">soon</span>.</h1>
      <p>PractEar is getting ready for launch. The app and full website will be available soon.</p>
    </main>
  </body>
</html>
